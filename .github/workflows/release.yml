name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (ignored when explicit_version is set)"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      explicit_version:
        description: "Explicit version (e.g. 1.0.0 or 1.0.0-rc1). Overrides bump if set."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Guard against non-main dispatch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Release workflow must be dispatched from main (got ${{ github.ref }})."
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Compute next version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
          EXPLICIT: ${{ inputs.explicit_version }}
        run: |
          set -euo pipefail
          package_json="src/generators-unity/Packages/games.engine-room.generators/package.json"
          current=$(jq -r '.version' "$package_json")
          echo "current=$current"

          if [[ -n "${EXPLICIT}" ]]; then
            next="$EXPLICIT"
            if [[ ! "$next" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
              echo "explicit_version '$next' is not a valid X.Y.Z[-prerelease]."
              exit 1
            fi
          else
            if [[ ! "$current" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "Cannot bump non-X.Y.Z current version '$current'. Use explicit_version."
              exit 1
            fi
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            case "$BUMP" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
              *) echo "Unknown bump '$BUMP'."; exit 1 ;;
            esac
            next="${major}.${minor}.${patch}"
          fi

          if [[ "$next" == "$current" ]]; then
            echo "Next version equals current ($current). Nothing to release."
            exit 1
          fi

          branch="release/${next}"
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "Branch $branch already exists on origin."
            exit 1
          fi
          if git rev-parse --verify "refs/tags/v${next}" >/dev/null 2>&1; then
            echo "Tag v${next} already exists locally."
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "v${next}" >/dev/null 2>&1; then
            echo "Tag v${next} already exists on origin."
            exit 1
          fi

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"

      - name: Update package.json
        env:
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail
          path="src/generators-unity/Packages/games.engine-room.generators/package.json"
          tmp="$(mktemp)"
          jq --arg v "$NEXT" '.version = $v' "$path" > "$tmp"
          mv "$tmp" "$path"

      - name: Update csproj <Version>
        env:
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail
          path="src/generators-src/EngineRoom.Generators/EngineRoom.Generators.csproj"
          if ! grep -q "<Version>" "$path"; then
            echo "csproj is missing <Version> element. Add one before running this workflow."
            exit 1
          fi
          sed -i -E "s|<Version>[^<]*</Version>|<Version>${NEXT}</Version>|" "$path"

      - name: Build generator (Release)
        run: dotnet build src/generators-src/EngineRoom.Generators.sln -c Release

      - name: Verify dll landed in package
        run: |
          set -euo pipefail
          ls -l src/generators-unity/Packages/games.engine-room.generators/Runtime/Plugins/EngineRoom.Generators.dll

      - name: Commit and push release branch
        env:
          NEXT: ${{ steps.version.outputs.next }}
          BRANCH: ${{ steps.version.outputs.branch }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add \
            src/generators-unity/Packages/games.engine-room.generators/package.json \
            src/generators-src/EngineRoom.Generators/EngineRoom.Generators.csproj \
            src/generators-unity/Packages/games.engine-room.generators/Runtime/Plugins/EngineRoom.Generators.dll
          git commit -m "Release v${NEXT}"
          git push -u origin "$BRANCH"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.version.outputs.next }}
          CURRENT: ${{ steps.version.outputs.current }}
          BRANCH: ${{ steps.version.outputs.branch }}
          BUMP: ${{ inputs.bump }}
          EXPLICIT: ${{ inputs.explicit_version }}
        run: |
          set -euo pipefail
          if [[ -n "$EXPLICIT" ]]; then
            mode="explicit ($EXPLICIT)"
          else
            mode="$BUMP bump"
          fi
          body=$(cat <<EOF
          Release **v${NEXT}** (previous: ${CURRENT}, mode: ${mode}).

          Updated:
          - \`package.json\` version
          - \`EngineRoom.Generators.csproj\` \`<Version>\`
          - Rebuilt \`EngineRoom.Generators.dll\`

          Merging this PR will trigger the tag workflow, which creates \`v${NEXT}\` on the merge commit.
          EOF
          )
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Release v${NEXT}" \
            --body "$body"
